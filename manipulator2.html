<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KSS RNG Manipulation RTA 2</title>
<style>
body {
	font-family: Arial, Helvetica, sans-serif;
	background-color: lightblue;
	color: #000;
	font-size: 22px;
	margin: 30px;
}
h1 {
	text-align: center;
}
.links {
	float: right;
	text-align: right;
	line-height: 150%;
}
input[type='text'] {
	transform: scale(1.4);
	margin-left: 8px;
	margin-right: 8px;
}
input[type='radio'] {
	transform: scale(1.5);
	margin-right: 8px;
}
input[type='checkbox'] {
	transform: scale(1.2);
	margin-right: 10px;
}
details summary {
	cursor: pointer;
}

.star-input-area {
	margin: 10px 0;
}
.star-box {
	display: inline-block;
	width: 40px;
	height: 40px;
	border: 1px solid #666;
	text-align: center;
	line-height: 40px;
	font-size: 22px;
	background: white;
	margin-right: 2px;
	vertical-align: middle;
}
.star-box.filled {
	background-color: #98fb98;
}

.result-table {
	font-size: 26px;
	border-collapse: collapse;
	margin: 10px 0;
}
.result-table th, .result-table td {
	border: 1px solid #38008080;
	padding: 6px 12px;
	text-align: center;
	vertical-align: middle;
}
.result-table th {
	background-color: rgb(176, 198, 255);
}
.result-table td {
	background-color: rgb(213, 225, 255);
}
.result-table td img, .result-table th img {
	vertical-align: middle;
}
.result-table td.enemy-cell {
	padding: 4px;
}
.result-table td.enemy-cell img {
	height: 50px;
}

#status-message {
	margin: 10px 0;
	font-size: 22px;
}

.settings-area {
	line-height: 180%;
}
.settings-area label {
	margin-right: 10px;
}

.test-table {
	border-collapse: collapse;
	font-size: 16px;
}
.test-table th, .test-table td {
	border: 1px solid #38008080;
	padding: 3px 10px;
	text-align: center;
	vertical-align: middle;
	line-height: 1em;
}
.test-table th {
	background-color: rgb(176, 198, 255);
}
.test-table td {
	background-color: rgb(213, 225, 255);
}
.test-table tfoot th, .test-table tfoot td {
	background-color: rgb(200, 215, 255);
}
</style>
</head>
<body class="ubuntu-font">

<h1>KSS RNG Manipulation RTA 2</h1>

<div class="links">
	<a href="https://github.com/slash-naf/KSS-RNG-Tool" target="_blank">Manual</a>
</div>

<div class="settings-area">
	<label id="label-lang">Language:</label>
	<select id="lang" onchange="switchLang(this.value)">
		<option value="en">English</option>
		<option value="ja">日本語</option>
	</select>
	<br>

	<label>Min:</label>
	<input type="number" style="width: 60px; font-size:16px" maxlength="5" type="text" id="min" value="2800">
	<label>Max:</label>
	<input type="number" style="width: 60px; font-size:16px" maxlength="5" type="text" id="max" value="3376">
	<br>

	<label id="label-magician" data-t="magician">Magician:</label>
	<select id="difficulty-magician">
		<option value="easy" selected>Easy</option>
		<option value="conservativeFast">Conservative Fast</option>
		<option value="aggressiveFast">Aggressive Fast</option>
	</select>

	<label id="label-knight" data-t="knight">Knight:</label>
	<select id="difficulty-knight">
		<option value="easy" selected>Easy</option>
		<option value="fast">Fast</option>
	</select>

	<label id="label-dragon" data-t="dragon">Dragon:</label>
	<select id="difficulty-dragon">
		<option value="easy" selected>Easy</option>
		<option value="fast">Fast</option>
	</select>
	<label><input type="checkbox" id="allow-dragon-star"><span id="label-dragon-star" data-t="dragonStar">Include Star Attack</span></label>
	<br>

	<label id="label-hammer-throw" data-t="hammerThrow">Hammer throw dash advances:</label>
	<input type="radio" name="hammer-throw" value="0"><label>0</label>
	<input type="radio" name="hammer-throw" value="1" checked><label>1</label>
	<input type="radio" name="hammer-throw" value="2"><label>2</label>
	<br>

	<details>
		<summary id="label-settings" data-t="settings">Settings</summary>
		<div style="padding-left: 2em">
			<div><label><input type="checkbox" id="no-numpad"><span id="label-no-numpad" data-t="noNumpad">No Numpad</span></label></div>
			<div>
				<label id="label-display-mode" data-t="displayMode">Display:</label>
				<select id="display-mode">
					<option value="actionOnly" data-t="displayModeActionOnly" selected>Manipulation only</option>
					<option value="withIndex" data-t="displayModeIndex">RNG index only</option>
					<option value="withPowers" data-t="displayModePowers">With Copy Essences</option>
					<option value="withFailPowers" data-t="displayModeFailPowers">With fail Copy Essences</option>
					<option value="withSimulation" data-t="displayModeSimulation">With simulation</option>
				</select>
			</div>
			<div>
				<label id="label-index-display-mode" data-t="indexDisplayMode">Index Format:</label>
				<select id="index-display-mode">
					<option value="indexOnly" data-t="indexDisplayModeIndexOnly" selected>Only RNG Index</option>
					<option value="hex" data-t="indexDisplayModeHex">With Hex RNG Value</option>
					<option value="split" data-t="indexDisplayModeSplit">With Split RNG Value</option>
				</select>
			</div>
			<button id="btn-default-settings" data-t="defaultSettings" style="margin-top:4px">Default Settings</button>
		</div>
	</details>

	<details>
		<summary id="label-test" data-t="test">Analysis</summary>
		<div style="padding-left: 2em">
			<label id="label-test-stars" data-t="testStars">Stars:</label>
			<input type="number" id="test-stars" value="3" min="1" max="10" style="width:50px; font-size:20px">
			<button id="test-run-btn" data-t="testRun" style="font-size:20px; padding:4px 12px; cursor:pointer">Run</button>
			<div id="test-result"></div>
		</div>
	</details>
</div>

<div class="star-input-area">
	<div id="star-boxes"></div>
</div>

<div id="status-message"></div>
<div id="result-area"></div>

<div style="height: 300px;"></div>

<script src="./manipulator2.mjs" type="module"></script>
</body>
</html>
